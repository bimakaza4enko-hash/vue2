<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban заметки</title>
    <link rel="stylesheet" href="css/main.css">
    <script src="js/vue.js" defer></script>
    <script src="js/main.js" defer></script>
</head>
<body>
    <div id="app">
        <h1>Kanban доска заметок</h1>
        
        <div class="board">
            <div class="column">
                <h2>Новые заметки <span class="limit">({{ notesInColumn('new') }}/3)</span></h2>
                <div v-if="columnBlocked" class="blocked-message">
                    Колонка заблокирована
                </div>
                <div class="cards">
                    <note-card
                        v-for="note in notesByStatus('new')"
                        :key="note.id"
                        :note="note"
                        @update="updateNote"
                        @delete="deleteNote"
                        @move-to-done="moveToDone"
                        :blocked="columnBlocked"
                    ></note-card>
                </div>
                <note-form v-if="notesByStatus('new').length < 3 && !columnBlocked" @add-note="addNote"></note-form>
            </div>
                        <div class="column">
                <h2>В работе <span class="limit">({{ notesInColumn('inProgress') }}/5)</span></h2>
                <div class="cards">
                    <note-card
                        v-for="note in notesByStatus('inProgress')"
                        :key="note.id"
                        :note="note"
                        @update="updateNote"
                        @delete="deleteNote"
                        @move-to-done="moveToDone"
                    ></note-card>
                </div>
            </div>
            <div class="column">
                <h2>Завершённые</h2>
                <div class="cards">
                    <note-card
                        v-for="note in notesByStatus('done')"
                        :key="note.id"
                        :note="note"
                        @delete="deleteNote"
                    ></note-card>
                </div>
            </div>
        </div>
    </div>
